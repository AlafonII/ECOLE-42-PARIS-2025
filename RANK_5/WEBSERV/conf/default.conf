server {
    listen 8080;
    host 0.0.0.0;
    root www/showcase;
    error_page 404 www/error/404.html;

    location / {
        root www/showcase;
        index index.html;
        methods GET;
        autoindex off;
    }
}

server {
	listen 8081;
	host 0.0.0.0;
	root www/dynamic;
	error_page 404 www/error/other_404.html;

	location / {
		root www/dynamic;
		index form.html;
		methods GET POST;
		cgi_extension .php;
		cgi_path /usr/lib/cgi-bin/php8.1;
		client_max_body_size 1000;
	}

	location /old {
		redirect: 302 http://localhost:8080/other.html;
	}
}

server {
	listen 8082;
	host 0.0.0.0;
	root www/uploads;
	error_page 404 www/error/404.html;

	location / {
		root www/uploads;
		methods GET POST DELETE PUT;
		autoindex on;
		upload_dir www/uploads;
		cgi_extension .bla;
	}
}

server {
	listen 8083;
	host 0.0.0.0;
	root www/tester;
	error_page 404 tester/error/404.html;
	client_max_body_size 1000000;

	location / {
		root www/tester;
		methods GET;
		autoindex on;
		cgi_path ./cgi/ubuntu_cgi_tester;
		cgi_extension .bla;
	}

	location /directory {
		alias	/YoupiBanane;
		index	youpi.bad_extension;
		methods	GET POST;
		cgi_path ./cgi/ubuntu_cgi_tester;
		cgi_extension .bla;
		client_max_body_size 200000000;
	}

	location /put_test/ {
		root www/tester;
		methods PUT GET;
		autoindex on;
	}

	location /post_body {
		root www/tester;
		index post_body;
		methods POST;
		autoindex on;
		client_max_body_size 100;
	}
}
