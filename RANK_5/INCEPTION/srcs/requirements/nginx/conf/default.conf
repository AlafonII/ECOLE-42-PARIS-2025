# ---------------------------------------------------------------
#  Nginx configuration for WordPress
#  This server block handles HTTPS traffic with SSL enabled
#  and proxies PHP requests to the WordPress container.
# ---------------------------------------------------------------

server {
    # ---------------------------------------------------------------
    #  Step 1: Listen on HTTPS (port 443) for both IPv4 and IPv6
    # ---------------------------------------------------------------
    listen 443 ssl;
	listen [::]:443 ssl;

	# ---------------------------------------------------------------
	#  Step 2: Define server name (domain)
	# ---------------------------------------------------------------
	server_name alafon.42.fr;

	# ---------------------------------------------------------------
	#  Step 3: Set root directory and default index file
	# ---------------------------------------------------------------
	root /var/www/html/wordpress;
	index index.php;

	# ---------------------------------------------------------------
	#  Step 4: Configure SSL certificates and protocols
	# ---------------------------------------------------------------
	ssl_certificate     	/etc/ssl/certs/nginx-selfsigned.crt;
	ssl_certificate_key		/etc/ssl/private/nginx-selfsigned.key;
	ssl_protocols       	TLSv1.3;

	# ---------------------------------------------------------------
	#  Step 5: Handle static file requests
	# ---------------------------------------------------------------
	location / {
		# Serve files directly if they exist, otherwise return 404
		try_files $uri $uri/ =404;
	}

	# ---------------------------------------------------------------
	#  Step 6: Handle PHP requests via FastCGI (WordPress backend)
	# ---------------------------------------------------------------
	location ~ [^/]\.php(/|$) {
		# Forward PHP requests to the PHP-FPM service named "wordpress"
		fastcgi_pass wordpress:9000;

		# Split the path info for PHP scripts (e.g., index.php/some/path)
		fastcgi_split_path_info ^(.+\.php)(/.+)$;

		# Define the default index for FastCGI
		fastcgi_index index.php;

		# Define the script filename and path information
		fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
		fastcgi_param PATH_INFO $fastcgi_path_info;

		# Include default FastCGI parameters
		include fastcgi_params;
	}
}
