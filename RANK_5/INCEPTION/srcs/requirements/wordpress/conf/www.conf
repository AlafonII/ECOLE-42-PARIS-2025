; ---------------------------------------------------------------
;  PHP-FPM Pool Configuration — www.conf
;  This file defines the PHP FastCGI process manager (FPM) settings
;  used by Nginx to serve PHP applications such as WordPress.
; ---------------------------------------------------------------

[www]

; ---------------------------------------------------------------
;  Step 1: Define user and group for PHP-FPM processes
; ---------------------------------------------------------------
; The worker processes will run as 'www-data' for both user and group
; make sure PHP scripts run under a non-privileged user called
user = www-data
group = www-data

; ---------------------------------------------------------------
;  Step 2: Set the listening socket or port
; ---------------------------------------------------------------
; PHP-FPM will listen for incoming FastCGI connections on port 9000
listen = 9000

; ---------------------------------------------------------------
;  Step 3: Configure process management (PM)
; ---------------------------------------------------------------
; 'dynamic' mode adjusts the number of child processes automatically
pm = dynamic

; Maximum number of child processes that can be alive at once
pm.max_children = 5

; Number of child processes created on startup
pm.start_servers = 2

; Minimum number of idle (waiting) child processes
pm.min_spare_servers = 1

; Maximum number of idle (waiting) child processes
pm.max_spare_servers = 3

; ---------------------------------------------------------------
;  Step 4: Environment handling
; ---------------------------------------------------------------
; Allow environment variables to be passed to PHP scripts
clear_env = no
